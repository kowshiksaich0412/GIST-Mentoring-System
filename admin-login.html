<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GIST Mentoring System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">⚙️</div>
                <h1 class="login-title">Admin Login</h1>
                <p class="login-subtitle">GIST Mentoring & Career Tracking System</p>
            </div>

            <form id="adminLoginForm" class="login-form">
                <div class="form-group">
                    <label class="form-label">Admin ID / Email</label>
                    <input type="text" name="adminId" class="form-input" required placeholder="admin@gist.ac.in" autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" required placeholder="Enter your password">
                </div>

                <div class="form-group">
                    <label class="form-checkbox">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" onclick="Notification.show('Please contact super.admin@gist.ac.in for password reset', 'info'); return false;" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-login">Login</button>
            </form>

            <div class="login-footer">
                <a href="index.html" class="back-link">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const adminId = this.adminId.value.trim();
            const password = this.password.value;
            
            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(el => el.remove());
            
            // Validate inputs
            if (!adminId) {
                Validator.showError(this.adminId, 'Admin ID is required');
                return;
            }
            
            if (!password) {
                Validator.showError(this.password, 'Password is required');
                return;
            }
            
            // Show loading
            Utils.showLoading();

            const credentials = { username: adminId, password: password };
            const ok = await Auth.login(credentials, 'admin');

            Utils.hideLoading();
            if (ok) {
                Notification.show('Login successful! Welcome, Admin.', 'success');
                setTimeout(() => {
                    window.location.href = 'admin-dashboard.html';
                }, 300);
            } else {
                Notification.show('Invalid admin ID or password.', 'error');
            }
        });

        // Clear error on input
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('input', function() {
                Validator.clearError(this);
            });
        });
    </script>
</body>
</html>
